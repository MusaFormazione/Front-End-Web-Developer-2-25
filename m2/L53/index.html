<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css">
</head>
<body>
    <h1>Gestione Pizze</h1>

    <section id="creazione-pizza" class="container">
        <h2>Aggiungi una pizza</h2>
        
        <form id="form-crea-pizza">
            <input type="text" id="gusto" class="form-control mb-3" placeholder="Gusto">
            <input type="number" id="prezzo" class="form-control mb-3" placeholder="Prezzo">
            <label class="mb-3">
                <input type="checkbox" id="disponibile">
                Disponibile
            </label>
            <div>
                <button class="btn btn-primary">Salva</button>
            </div>
        </form>

    </section>
<hr>
<hr>
    <section id="lista-pizze"  class="container">

        <table class="table">

            <thead>
                <tr>
                    <th>#</th>
                    <th>Gusto</th>
                    <th>Prezzo</th>
                    <th>Disponibile</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody id="tabella-pizze">
            </tbody>
        </table>


    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.all.min.js"></script>
    <script src="./js/home.js"></script>
</body>
</html>
