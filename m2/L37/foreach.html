        //     console.log(p);            
        // }

        console.error("=============================");

        /*
        ForEach non restituisce niente
        */

            //i è un Parametro facoltativo che contiene l'indice dell'elemento ciclato (lo usi solo se ti serve)
            console.log(p, i);            
        });
