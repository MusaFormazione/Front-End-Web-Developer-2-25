<!DOCTYPE html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

    <script>

        const arrayPizze = [
            {gusto: "Margherita", prezzo: 5},
            {gusto: "Marinara", prezzo: 4},
            {gusto: "Diavola", prezzo: 1},
        ];

        //Funziona come find, ma anziché restituire l'oggetto trovato restituisce il suo indice nell'array. 
        const indexPizzaCercata = arrayPizze.findIndex(p => p.gusto == "Marinara");
        console.log(indexPizzaCercata);

    </script>
