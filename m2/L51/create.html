<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


    <script>

        fetch('http://localhost:3000/pizzas', {
            method: "POST",
            headers: {
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                gusto: "Margherita",
                prezzo: 5,
                disponibile: true
            })
        })
        .then(res => res.json())
        .then(res => {
            alert(`è stata creata la pizza ${res.gusto} con id: ${res.id}`)
        })

    </script>
    
</body>
</html>
