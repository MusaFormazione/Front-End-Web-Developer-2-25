        class SwalCopy{
            static fire(){

                const denyBtn = document.createElement('button')
                const acceptBtn = document.createElement('button')
                return new Promise((successo, fallimento) => {

                    const result = {
                        deny: false,
                        accept: false
                    }

                    denyBtn.addEventListener('click',()=>{
                        result.deny = true;
                        successo(result);
                    })

                    acceptBtn.addEventListener('click',()=>{
                        result.accept = true;
                        successo(result);
                    })


                })
            }
        }


        SwalCopy.fire()
        .then(res => {
            if(res.deny){
                //fa qualcosa
            }

            if(res.accept){

            }
        })

    </script>
