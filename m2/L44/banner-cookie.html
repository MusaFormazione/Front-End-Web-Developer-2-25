<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        #cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            box-shadow: -3px -3px 15px #000;
            padding: 15px;
            box-sizing: border-box;
            display: none;
        }
        #cookie-banner.show{
            display: block;
        }
    </style>
</head>

<body>

    <div id="cookie-banner">
        <div class="container">
            <div class="row">

                <div class="col-9">
                    <p>
                        Lorem ipsum dolor sit amet consectetur adipisicing elit. Facere dolores tenetur, commodi quasi
                        id vitae illo voluptates saepe harum excepturi nihil blanditiis magni accusantium exercitationem
                        iste a necessitatibus! Est, repudiandae.
                    </p>
                </div>

                <div class="col-3">
                    <button id="accetta" class="btn btn-primary">Accetta</button>
                    <button id="rifiuta" class="btn btn-danger">Rifiuta</button>
                </div>
            </div>
        </div>
    </div>



    <script>

        
        /** Funzione per scrivere un cookie
         * 
         * @param {string} key - Il nome del cookie
         * @param {string} value - Il valore del cookie
         */
        function setCookie(key, value){

            const date = new Date();//creo un oggetto data
            date.setMonth(date.getMonth() + 1)//aggiungo un mese

            const expires = `expires=${date.toUTCString()}`;

            // scrivo il cookie
            document.cookie = `${key}=${value}; ${expires}`;
            
        }

         /** Funzione per ottenere il valore di un cookie
         * 
         * @param {string} key - Il nome del cookie
         * @returns {string} value - il valore del cookie
         */
        function getCookie(key){
            const cookies = document.cookie.split('; ');//recupero tutti i cookie e li divido, ottenendo un array di coppie (string)

            const cookie = cookies.find(c => c.startsWith(key));

            // Find restituisce Null se Il Cookie non viene trovato
            // Quindi con l'operatore ternario sottostante, io verifico e. Se il cookie non viene trovato allora restituisco null 
            //Altrimenti taglio il cookie in corrispondenza del simbolo uguale e prelievo solo quello che c'è dopo l'uguale, ossia il valore. 
            return cookie ? cookie.split('=')[1] : null;
        }

        
        const cookieBanner = document.getElementById('cookie-banner');
        const accetta = document.getElementById('accetta');
        const rifiuta = document.getElementById('rifiuta');

        //nome del cookie, per avere suggerimenti e evitare errori di battitura
        const COOKIE_CONSENT = 'cookie_consent';
        
        accetta.addEventListener('click',function(){
            setCookie(COOKIE_CONSENT,'accept');
            cookieBanner.classList.remove('show')
        })

        rifiuta.addEventListener('click',function(){
            setCookie(COOKIE_CONSENT,'deny');
            cookieBanner.classList.remove('show')
        })

        //se non è stato salvato alcun cookie
        if(!getCookie(COOKIE_CONSENT)){
            //allora mostra il banne
            cookieBanner.classList.add('show')
        }


        if(getCookie(COOKIE_CONSENT) && getCookie(COOKIE_CONSENT) === 'accept'){
            //attiva script che rilasciano cookie
        }


    </script>
</body>

</html>
